<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador Sing-box Android</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: 168, 85, 247;
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.6);
            --option-bg: rgba(30, 41, 59, 0.5);
            --terminal-bg: #0f1115;
            --terminal-header: #1e1e1e;
        }

        body.light-mode {
            --bg-color: #fdf4ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(0, 0, 0, 0.05);
            --input-bg: #ffffff;
            --option-bg: #ffffff;
            --terminal-bg: #f8fafc;
            --terminal-header: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
        }

        .glass-option {
            background: var(--option-bg);
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            transition: 0.3s;
        }

        .disabled-option {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.8);
        }

        .modern-input {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
        }

        .theme-toggle-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .toggle-checkbox { display: none; }
        .toggle-switch {
            width: 40px; height: 22px;
            background: #cbd5e1;
            border-radius: 99px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        body:not(.light-mode) .toggle-switch { background: #334155; }
        .toggle-switch::after {
            content: ''; position: absolute;
            top: 2px; left: 2px;
            width: 18px; height: 18px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .toggle-checkbox:checked + .toggle-switch { background: #a855f7; }
        .toggle-checkbox:checked + .toggle-switch::after { transform: translateX(18px); }

        .mode-card { cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .mode-card.active {
            background: rgba(168, 85, 247, 0.1);
            border-color: #a855f7;
        }
        .mode-card.active i { color: #a855f7; }

        pre { margin: 0; }
    </style>
</head>
<body class="min-h-screen py-6 px-3 flex justify-center items-start">

    <button id="theme-toggle" class="theme-toggle-btn"><i class="fas fa-moon text-xl"></i></button>

    <div class="w-full max-w-5xl space-y-6">
        <div class="text-center mt-4">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">Sing-box Android</h1>
            <p class="text-xs text-gray-500 tracking-widest uppercase mt-1">SGEN v18.1 (Restored + TProxy Fix)</p>
        </div>

        <div id="status-container" class="hidden glass-card p-3 text-center text-sm font-medium"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7 space-y-5">
                <!-- Input -->
                <div class="glass-card p-5 space-y-3">
                    <label class="text-sm font-semibold text-gray-400 block mb-2">Enlace de Configuración</label>
                    <textarea id="proxy-links" class="modern-input w-full h-32 rounded-xl p-3 text-xs placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50" placeholder="vless://..."></textarea>
                </div>

                <!-- Mode -->
                <div class="glass-card p-5">
                    <h3 class="text-sm font-semibold text-gray-400 mb-3">Modo de Conexión</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div id="tun-btn" class="mode-card glass-option p-3 text-center active" onclick="selectMode('tun')">
                            <i class="fa-solid fa-shield-halved text-xl mb-1 text-gray-400"></i>
                            <div class="font-bold text-xs">TUN Mode</div>
                        </div>
                        <div id="tproxy-btn" class="mode-card glass-option p-3 text-center" onclick="selectMode('tproxy')">
                            <i class="fa-solid fa-route text-xl mb-1 text-gray-400"></i>
                            <div class="font-bold text-xs">TPROXY</div>
                        </div>
                    </div>
                </div>

                <!-- Advanced -->
                <div class="glass-card p-5">
                    <h3 class="text-sm font-semibold text-gray-400 mb-3">Ajustes Avanzados</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <!-- Keep Alive -->
                        <div id="keep-alive-option-group" class="glass-option p-3 disabled-option">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-semibold">Keep Alive</span>
                                <label><input type="checkbox" id="keep-alive-toggle" class="toggle-checkbox" checked disabled><div class="toggle-switch"></div></label>
                            </div>
                            <div class="text-[10px] text-gray-500 mt-1">gRPC (2h / 60s)</div>
                        </div>

                        <!-- Insecure -->
                        <div id="insecure-option-group" class="glass-option p-3 disabled-option">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-semibold">Insecure</span>
                                <label><input type="checkbox" id="insecure-toggle" class="toggle-checkbox" checked disabled><div class="toggle-switch"></div></label>
                            </div>
                            <div class="text-[10px] text-gray-500 mt-1">Skip Verify (SNI)</div>
                        </div>

                        <!-- Bootstrap DNS (RESTAURADO) -->
                        <div id="bootstrap-dns-option-group" class="glass-option p-3 disabled-option">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-semibold">Bootstrap DNS</span>
                            </div>
                            <select id="bootstrap-dns-select" class="modern-input w-full rounded text-xs p-1" disabled>
                                <option value="google">Google (8.8.8.8)</option>
                                <option value="cloudflare">Cloudflare (1.1.1.1)</option>
                            </select>
                            <div class="text-[10px] text-gray-500 mt-1">Conexión Inicial</div>
                        </div>

                        <!-- DNS Seguro -->
                        <div id="dns-option-group" class="glass-option p-3 disabled-option">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-semibold">DNS Seguro</span>
                                <label><input type="checkbox" id="dns-toggle" class="toggle-checkbox" disabled><div class="toggle-switch"></div></label>
                            </div>
                            <div id="dns-details" class="hidden">
                                <select id="dns-select" class="modern-input w-full rounded text-xs p-1">
                                    <option value="google">Google</option>
                                    <option value="cloudflare">Cloudflare</option>
                                </select>
                            </div>
                            <div class="text-[10px] text-gray-500 mt-1">OFF: Dual DNS</div>
                        </div>

                        <!-- Fingerprint -->
                        <div id="client-fingerprint-option-group" class="glass-option p-3 disabled-option">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-semibold">uTLS</span>
                                <label><input type="checkbox" id="client-fingerprint-toggle" class="toggle-checkbox" disabled><div class="toggle-switch"></div></label>
                            </div>
                            <div id="client-fingerprint-details" class="hidden">
                                <select id="client-fingerprint-select" class="modern-input w-full rounded text-xs p-1">
                                    <option value="chrome">Chrome</option>
                                    <option value="randomized">Aleatorio</option>
                                    <option value="android">Android</option>
                                </select>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Output -->
            <div class="lg:col-span-5 flex flex-col gap-4">
                <div class="glass-card p-4 sticky top-4 z-10 shadow-lg">
                    <button id="generate-btn" class="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-purple-600 to-pink-600 shadow-lg hover:opacity-90 transition disabled:opacity-50" disabled>GENERAR JSON</button>
                    <button id="copy-btn" class="w-full py-3 mt-3 rounded-xl font-semibold bg-gray-600/30 hover:bg-gray-600/50 transition disabled:opacity-50" disabled>COPIAR</button>
                </div>
                <div class="glass-card overflow-hidden flex-1 min-h-[400px]">
                    <div class="bg-black/20 px-4 py-2 border-b border-white/10 text-xs font-mono text-gray-400">config.json</div>
                    <pre class="p-4 overflow-auto h-full text-xs font-mono text-purple-200 whitespace-pre-wrap break-all" id="output-config"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // UI References
        const themeToggle = document.getElementById('theme-toggle');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const proxyLinksInput = document.getElementById('proxy-links');
        const outputConfig = document.getElementById('output-config');
        const statusContainer = document.getElementById('status-container');
        
        // Mode & Options
        let selectedMode = 'tun';
        const keepAliveGroup = document.getElementById('keep-alive-option-group');
        const keepAliveToggle = document.getElementById('keep-alive-toggle');
        const insecureGroup = document.getElementById('insecure-option-group');
        const insecureToggle = document.getElementById('insecure-toggle');
        
        const bootstrapGroup = document.getElementById('bootstrap-dns-option-group');
        const bootstrapSelect = document.getElementById('bootstrap-dns-select');
        
        const dnsGroup = document.getElementById('dns-option-group');
        const dnsToggle = document.getElementById('dns-toggle');
        const dnsDetails = document.getElementById('dns-details');
        const dnsSelect = document.getElementById('dns-select');
        
        const fingerprintGroup = document.getElementById('client-fingerprint-option-group');
        const fingerprintToggle = document.getElementById('client-fingerprint-toggle');
        const fingerprintDetails = document.getElementById('client-fingerprint-details');
        const fingerprintSelect = document.getElementById('client-fingerprint-select');

        // Theme
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });

        // Mode Switcher
        window.selectMode = (mode) => {
            selectedMode = mode;
            document.getElementById('tun-btn').classList.toggle('active', mode === 'tun');
            document.getElementById('tproxy-btn').classList.toggle('active', mode === 'tproxy');
        };

        // Toggle Logic
        const toggleDisplay = (toggle, target) => {
            toggle.addEventListener('change', () => target.classList.toggle('hidden', !toggle.checked));
        };
        toggleDisplay(dnsToggle, dnsDetails);
        toggleDisplay(fingerprintToggle, fingerprintDetails);

        // Input Logic
        proxyLinksInput.addEventListener('input', () => {
            const hasLink = proxyLinksInput.value.trim().length > 0;
            generateBtn.disabled = !hasLink;
            
            // Enable/Disable Groups
            const toggleGroup = (group, enabled) => {
                group.classList.toggle('disabled-option', !enabled);
                const inputs = group.querySelectorAll('input, select');
                inputs.forEach(el => el.disabled = !enabled);
            };

            toggleGroup(bootstrapGroup, hasLink);
            toggleGroup(dnsGroup, hasLink);
            
            // Simple parsing to detect gRPC/TLS for auto-enabling options
            const isGrpc = proxyLinksInput.value.includes('type=grpc') || proxyLinksInput.value.includes('net=grpc');
            const isTls = proxyLinksInput.value.includes('security=tls') || proxyLinksInput.value.includes('tls=1');

            toggleGroup(keepAliveGroup, isGrpc);
            if(isGrpc) keepAliveToggle.checked = true;

            toggleGroup(insecureGroup, isTls);
            toggleGroup(fingerprintGroup, isTls);
            if(isTls) insecureToggle.checked = true;
            
            if(hasLink) {
                statusContainer.classList.remove('hidden');
                statusContainer.textContent = "✅ Enlace detectado";
                statusContainer.className = "mx-auto max-w-2xl glass-card rounded-xl p-3 text-center font-medium text-sm text-green-400 bg-green-500/10 border border-green-500/20";
            } else {
                statusContainer.classList.add('hidden');
            }
        });

        // GENERATION LOGIC
        generateBtn.addEventListener('click', () => {
            const link = proxyLinksInput.value.trim();
            if (!link) return;

            // Basic parsing (simplified for reliability)
            let server = "server", port = 443, uuid = "", type = "vless", serviceName = "gun", host = "";
            try {
                const url = new URL(link);
                server = url.hostname;
                port = parseInt(url.port) || 443;
                uuid = url.username;
                const params = new URLSearchParams(url.search);
                serviceName = params.get('serviceName') || params.get('path') || "gun";
                host = params.get('sni') || params.get('host') || server;
                
                if (link.startsWith('vmess')) type = "vmess";
                if (link.startsWith('trojan')) type = "trojan";
            } catch(e) { console.log("Parse error", e); }

            // Bootstrap IP
            const bootstrapIp = (bootstrapSelect.value === 'google') ? '8.8.8.8' : '1.1.1.1';

            // Base Config
            const config = {
                "log": { "level": "error", "timestamp": true },
                "dns": {
                    "servers": [
                        { "tag": "bootstrap", "address": `udp://${bootstrapIp}`, "detour": "direct" }, // BOOTSTRAP RESTORED
                        { "tag": "google", "address": "udp://8.8.8.8", "detour": "proxy" },
                        { "tag": "cloudflare", "address": "udp://1.1.1.1", "detour": "proxy" },
                        { "tag": "local", "address": "local", "detour": "direct" },
                        { "tag": "fakeip", "address": "fakeip" } // Modern fakeip
                    ],
                    "rules": [
                        { "domain": [server], "server": "bootstrap" }, // RESOLVE VPS VIA BOOTSTRAP
                        { "query_type": ["A", "AAAA"], "server": "fakeip" }
                    ],
                    "fakeip": { "enabled": true, "inet4_range": "198.18.0.0/15" },
                    "strategy": "ipv4_only"
                },
                "inbounds": [],
                "outbounds": [],
                "route": {
                    "rules": [
                        { "protocol": "dns", "action": "hijack-dns" },
                        { "ip_is_private": true, "outbound": "direct" }
                    ],
                    "final": "proxy",
                    "auto_detect_interface": true,
                    "default_domain_resolver": "bootstrap" // BOOTSTRAP RESTORED
                }
            };

            // Inbounds
            if (selectedMode === 'tun') {
                // TUN INTACTO (v18)
                config.inbounds.push({
                    "type": "tun",
                    "tag": "tun-in",
                    "interface_name": "tun0",
                    "inet4_address": ["172.19.0.1/30"], // Legacy array support just in case
                    "address": ["172.19.0.1/30"], // Modern 1.12+
                    "mtu": 1400,
                    "auto_route": true,
                    "strict_route": true,
                    "stack": "system",
                    "sniff": true
                });
            } else {
                // TPROXY FIX (Added specific DNS listener)
                config.inbounds.push(
                    { "type": "tproxy", "tag": "tproxy-in", "listen": "::", "listen_port": 9898, "sniff": true },
                    { "type": "redirect", "tag": "redirect-in", "listen": "::", "listen_port": 9797, "sniff": true },
                    // NEW: Direct DNS Listener for TProxy stability on port 1053 (Mihomo style)
                    { "type": "direct", "tag": "dns-in", "listen": "::", "listen_port": 1053, "sniff": true }
                );
            }

            // Outbound
            const outbound = {
                "type": type,
                "tag": "proxy",
                "server": server,
                "server_port": port,
                "uuid": uuid,
                "packet_encoding": "xudp"
            };

            // Transport & TLS
            const isGrpc = keepAliveToggle.checked;
            if (isGrpc) {
                outbound.transport = {
                    "type": "grpc",
                    "service_name": serviceName,
                    "idle_timeout": "2h",
                    "ping_timeout": "60s",
                    "permit_without_stream": true
                };
            } else {
                outbound.transport = {
                    "type": "ws",
                    "path": "/",
                    "headers": { "Host": host }
                };
            }

            if (insecureToggle.checked) {
                outbound.tls = {
                    "enabled": true,
                    "server_name": host,
                    "insecure": true,
                    "utls": { "enabled": true, "fingerprint": fingerprintSelect.value }
                };
            }

            config.outbounds.push(outbound);
            config.outbounds.push({ "type": "direct", "tag": "direct" });

            // Final DNS Adjustments
            if (dnsToggle.checked) {
                const sel = dnsSelect.value;
                config.dns.final = sel;
            } else {
                config.dns.final = "google"; // Dual fallback logic handled by server list order
            }

            outputConfig.textContent = JSON.stringify(config, null, 2);
            copyBtn.disabled = false;
        });

        copyBtn.addEventListener('click', () => {
            const text = outputConfig.textContent;
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            copyBtn.innerText = "COPIADO";
            setTimeout(() => copyBtn.innerText = "COPIAR", 2000);
        });
    });
    </script>
</body>
</html>
